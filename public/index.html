<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SterzoFM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-view" class="view">
        <h1>SterzoFM</h1>
        <p>Scegli il tuo genere e sali a bordo:</p>
        <div id="genres-container"></div>
        <br>
        <a href="#admin" class="admin-link">Area Riservata</a>
    </div>

    <div id="player-view" class="view hidden">
        <a href="/" class="back-btn">← Torna alla Home</a>
        <h2 id="current-genre">Genere</h2>
        
        <div class="controls" style="margin-bottom: 20px; display: flex; justify-content: center; gap: 15px;">
            <button id="play-btn">PLAY</button>
            <button id="fullscreen-btn" style="background: #333; color: #fff;">SCHERMO INTERO</button>
        </div>

        <!-- Container che racchiude canzone e visualizer per il fullscreen -->
        <div id="visualizer-fullscreen-wrapper">
            <div class="now-playing-container">
                <span id="now-playing-title">Nessun brano in riproduzione</span>
                <span id="now-playing-time">00:00 / 00:00</span>
            </div>
            <div id="visualizer-container"></div>
        </div>
        <audio id="radio-audio" crossorigin="anonymous"></audio>
    </div>

    <div id="admin-view" class="view hidden">
        <a href="/" class="back-btn">← Torna alla Home</a>
        <h2 style="color: #ff007f; margin-top: 20px; letter-spacing: 1px;">CONSOLE DI AMMINISTRAZIONE</h2>
        
        <!-- Schermata di Login PIN -->
        <div id="login-container" class="admin-panel">
            <p>Inserisci il PIN per sbloccare la console:</p>
            <div class="pin-form">
                <input type="password" id="pin-input" placeholder="PIN" maxlength="4" autocomplete="off">
                <button id="login-btn">SBLOCCA</button>
            </div>
            <p id="login-error" class="error-msg"></p>
        </div>

        <!-- Schermata Principale di Controllo -->
        <div id="dashboard-container" class="admin-panel hidden">
            <div class="admin-top-bar">
                <input type="text" id="new-genre-input" placeholder="Nuovo genere (es: techno)" autocomplete="off">
                <button id="create-genre-btn">CREA GENERE</button>
            </div>
            <p id="genre-error" class="error-msg"></p>
            
            <div id="admin-genres-list" class="admin-list-container">
                <!-- Verrà popolato dinamicamente con i generi e le canzoni -->
            </div>

            <!-- Monitoraggio Spazio su Disco Alwaysdata -->
            <div class="space-usage-container">
                <div class="space-usage-header">
                    <span>Spazio su Alwaysdata.net</span>
                    <span id="space-usage-text">Calcolo in corso...</span>
                </div>
                <div class="space-usage-bar-bg">
                    <div id="space-usage-bar" class="space-usage-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/audiomotion-analyzer@4"></script>
    <script src="script.js"></script>
</body>
</html>
